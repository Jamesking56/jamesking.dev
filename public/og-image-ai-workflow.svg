<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="100%" style="stop-color:#bb9af7"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="#1a1b26" stroke="#414868" stroke-width="2"/>
  
  <!-- Terminal dots -->
  <circle cx="80" cy="80" r="12" fill="#f7768e"/>
  <circle cx="112" cy="80" r="12" fill="#e0af68"/>
  <circle cx="144" cy="80" r="12" fill="#9ece6a"/>
  
  <!-- Accent bar -->
  <rect x="80" y="180" width="100" height="8" rx="4" fill="url(#accent)"/>
  
  <!-- Main title -->
  <text x="80" y="280" font-family="monospace" font-size="48" font-weight="bold" fill="#c0caf5">What I Stopped Doing</text>
  <text x="80" y="340" font-family="monospace" font-size="48" font-weight="bold" fill="#7aa2f7">When I Started Using AI</text>
  
  <!-- Hook -->
  <text x="80" y="420" font-family="monospace" font-size="24" fill="#a9b1d6">I stopped writing tests. I ramped up debugging.</text>
  <text x="80" y="455" font-family="monospace" font-size="24" fill="#a9b1d6">Here's what actually changed.</text>
  
  <!-- Author branding -->
  <text x="80" y="530" font-family="monospace" font-size="20" fill="#565f89">jamesking.dev</text>
  <rect x="80" y="540" width="200" height="2" fill="#414868"/>
</svg>
