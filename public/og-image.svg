<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="100%" style="stop-color:#bb9af7"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="#1a1b26" stroke="#414868" stroke-width="2"/>
  
  <!-- Terminal dots -->
  <circle cx="80" cy="80" r="12" fill="#f7768e"/>
  <circle cx="112" cy="80" r="12" fill="#e0af68"/>
  <circle cx="144" cy="80" r="12" fill="#9ece6a"/>
  
  <!-- Accent bar -->
  <rect x="80" y="170" width="100" height="8" rx="4" fill="url(#accent)"/>
  
  <!-- Main title -->
  <text x="600" y="280" font-family="monospace" font-size="56" font-weight="bold" fill="#c0caf5" text-anchor="middle">Technical Lead</text>
  <text x="600" y="350" font-family="monospace" font-size="48" font-weight="bold" fill="#7aa2f7" text-anchor="middle">AI Code Governance</text>
  
  <!-- Tech tags -->
  <text x="600" y="440" font-family="monospace" font-size="22" fill="#bb9af7" text-anchor="middle">AI Governance • Laravel • PHP • Kubernetes • AWS • Symfony</text>
  
  <!-- Bottom branding -->
  <text x="600" y="540" font-family="monospace" font-size="24" fill="#a9b1d6" text-anchor="middle">jamesking.dev</text>
  <rect x="520" y="550" width="160" height="2" fill="#414868"/>
</svg>
