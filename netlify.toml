# Netlify configuration for Astro static site

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "24"

# Cache headers for CDN
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    Vary = "Accept"

# Link headers for agent discovery (RFC 8288)
[[headers]]
  for = "/"
  [headers.values]
    Link = "</llms.txt>; rel=\"alternate\"; type=\"text/plain\", </rss.xml>; rel=\"alternate\"; type=\"application/rss+xml\", </humans.txt>; rel=\"start\"; type=\"text/plain\", </index.md>; rel=\"alternate\"; type=\"text/markdown\"

# API Catalog (RFC 9727)
[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json"

# Markdown version of homepage
[[headers]]
  for = "/index.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Vary = "Accept"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
